name: Sync Template To Awesome-Unraid

on:
  push:
    branches: [ main ]
    paths:
      - '*.xml'
      - 'assets/*.png'
      - '.github/workflows/sync-template.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sync:
    if: ${{ vars.ENABLE_AIO_AUTOMATION == 'true' && vars.TEMPLATE_XML != '' && vars.AWESOME_UNRAID_REPOSITORY != '' && vars.AWESOME_UNRAID_XML_NAME != '' && vars.AWESOME_UNRAID_ICON_NAME != '' && secrets.SYNC_TOKEN != '' }}
    runs-on: ubuntu-latest
    env:
      TEMPLATE_XML: ${{ vars.TEMPLATE_XML }}
      TEMPLATE_ICON_PATH: ${{ vars.TEMPLATE_ICON_PATH || 'assets/app-icon.png' }}
      TARGET_REPOSITORY: ${{ vars.AWESOME_UNRAID_REPOSITORY }}
      TARGET_XML_NAME: ${{ vars.AWESOME_UNRAID_XML_NAME }}
      TARGET_ICON_NAME: ${{ vars.AWESOME_UNRAID_ICON_NAME }}
    steps:
      - name: Checkout Source Repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Checkout Target Repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          repository: ${{ env.TARGET_REPOSITORY }}
          token: ${{ secrets.SYNC_TOKEN }}
          path: target-repo

      - name: Copy and Commit Template
        run: |
          cp "${TEMPLATE_XML}" "target-repo/${TARGET_XML_NAME}"
          mkdir -p target-repo/icons
          if [ -f "${TEMPLATE_ICON_PATH}" ]; then
            cp "${TEMPLATE_ICON_PATH}" "target-repo/icons/${TARGET_ICON_NAME}"
          fi
          cd target-repo
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${TARGET_XML_NAME}"
          if [ -f "icons/${TARGET_ICON_NAME}" ]; then
            git add "icons/${TARGET_ICON_NAME}"
          fi
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: auto-sync AIO template assets" && git push)
