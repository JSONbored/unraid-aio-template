name: CI / AIO Template

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/**"
      - ".trunk/**"
      - "CHANGELOG.md"
      - "Dockerfile"
      - "assets/**"
      - "cliff.toml"
      - "components.toml"
      - "components/**"
      - "docs/upstream/**"
      - "pyproject.toml"
      - "renovate.json"
      - "requirements-dev.txt"
      - "rootfs/**"
      - "scripts/**"
      - "template-aio.xml"
      - "tests/**"
      - "upstream.toml"
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/**"
      - ".trunk/**"
      - "CHANGELOG.md"
      - "Dockerfile"
      - "assets/**"
      - "cliff.toml"
      - "components.toml"
      - "components/**"
      - "docs/upstream/**"
      - "pyproject.toml"
      - "renovate.json"
      - "requirements-dev.txt"
      - "rootfs/**"
      - "scripts/**"
      - "template-aio.xml"
      - "tests/**"
      - "upstream.toml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  aio-build:
    uses: JSONbored/aio-fleet/.github/workflows/aio-build.yml@337b82e04d6d1b887c704326a967bb1b10416752
    permissions:
      contents: read
      packages: write
      pull-requests: write
    with:
      app_slug: unraid-aio-template
      image_name: jsonbored/unraid-aio-template
      workflow_title: CI / AIO Template
      docker_cache_scope: unraid-aio-template-image
      pytest_image_tag: aio-template:pytest
      publish_profile: template
      upstream_name: AIO Template
      image_description: Reusable Unraid AIO template image
      python_version: "3.13"
      trunk_org_slug: aethereal
      publish_platforms: linux/amd64,linux/arm64
      checkout_submodules: false
      integration_pytest_args: tests/integration -m integration
      run_extended_integration: false
      extended_integration_pytest_args: ""
      generator_check_command: ""
      upstream_digest_arg: UPSTREAM_IMAGE_DIGEST
      catalog_published: false
      xml_paths: |
        template-aio.xml
      extra_publish_paths: |

      catalog_assets: |
        template-aio.xml|template-aio.xml
    secrets: inherit
