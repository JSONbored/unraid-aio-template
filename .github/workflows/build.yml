name: Build AIO Image

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
    paths:
      - 'Dockerfile'
      - 'rootfs/**'
      - 'scripts/**'
      - 'upstream.toml'
      - '.github/workflows/build.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'Dockerfile'
      - 'rootfs/**'
      - 'scripts/**'
      - 'upstream.toml'
      - '.github/workflows/build.yml'
  workflow_dispatch:
    inputs:
      run_smoke_test:
        description: "Run the smoke-test job"
        required: false
        default: true
        type: boolean
      publish_image:
        description: "Publish image tags from the current ref"
        required: false
        default: false
        type: boolean

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ vars.IMAGE_NAME_OVERRIDE || github.repository }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-template:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      ENABLE_AIO_AUTOMATION: ${{ vars.ENABLE_AIO_AUTOMATION }}
      TEMPLATE_XML: ${{ vars.TEMPLATE_XML }}
      AWESOME_UNRAID_REPOSITORY: ${{ vars.AWESOME_UNRAID_REPOSITORY }}
      AWESOME_UNRAID_XML_NAME: ${{ vars.AWESOME_UNRAID_XML_NAME }}
      AWESOME_UNRAID_ICON_NAME: ${{ vars.AWESOME_UNRAID_ICON_NAME }}
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Validate shell scripts
        run: |
          bash -n scripts/smoke-test.sh
          bash -n scripts/validate-derived-repo.sh
          python3 -m py_compile scripts/check-upstream.py
          find rootfs -type f -name '*.sh' -print0 | xargs -0 -n1 bash -n
          find rootfs -type f -path '*/run' -print0 | xargs -0 -n1 bash -n

      - name: Validate XML
        run: |
          python3 - <<'PY'
          import os
          import xml.etree.ElementTree as ET

          xml_path = os.environ.get("TEMPLATE_XML") or "template-aio.xml"
          ET.parse(xml_path)
          print(f"Parsed XML successfully: {xml_path}")
          PY

      - name: Validate derived repo placeholders
        run: |
          chmod +x scripts/validate-derived-repo.sh
          ./scripts/validate-derived-repo.sh .

  smoke-test:
    if: ${{ vars.ENABLE_AIO_AUTOMATION == 'true' && (github.event_name != 'workflow_dispatch' || inputs.run_smoke_test == true) }}
    needs: validate-template
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Build local test image
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: .
          platforms: linux/amd64
          load: true
          tags: aio-template:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test
        run: |
          chmod +x scripts/smoke-test.sh
          bash -x ./scripts/smoke-test.sh aio-template:ci

      - name: Dump smoke test diagnostics
        if: failure()
        run: |
          docker ps -a
          docker inspect "${CONTAINER_NAME:-aio-template-smoke}" || true
          docker logs "${CONTAINER_NAME:-aio-template-smoke}" || true

  publish:
    if: ${{ vars.ENABLE_AIO_AUTOMATION == 'true' && github.event_name != 'pull_request' && ((github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))) || (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main' && inputs.publish_image == true)) }}
    needs:
      - validate-template
      - smoke-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Login to GHCR
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3.6.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: prep
        run: |
          image="${REGISTRY}/${IMAGE_NAME}"
          sha_tag="${image}:sha-${GITHUB_SHA}"

          {
            echo "tags<<EOF"
            if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
              version="${GITHUB_REF#refs/tags/}"
              version_no_v="${version#v}"
              IFS='.' read -r major minor patch <<< "${version_no_v}"
              echo "${image}:${version}"
              if [[ -n "${major:-}" ]]; then
                echo "${image}:v${major}"
              fi
              if [[ -n "${major:-}" && -n "${minor:-}" ]]; then
                echo "${image}:v${major}.${minor}"
              fi
            else
              echo "${image}:latest"
            fi
            echo "${sha_tag}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Build and push multi-arch image
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: ${{ steps.prep.outputs.tags }}
