name: CI / Template

on:
  push:
    branches: [main]
    paths:
      - CHANGELOG.md
      - Dockerfile
      - cliff.toml
      - pyproject.toml
      - requirements-dev.txt
      - "*.xml"
      - assets/**
      - rootfs/**
      - scripts/**
      - tests/**
      - .trunk/**
      - upstream.toml
      - renovate.json
      - .github/workflows/**
  pull_request:
    branches: [main]
    paths:
      - CHANGELOG.md
      - Dockerfile
      - cliff.toml
      - pyproject.toml
      - requirements-dev.txt
      - "*.xml"
      - assets/**
      - rootfs/**
      - scripts/**
      - tests/**
      - .trunk/**
      - upstream.toml
      - renovate.json
      - .github/workflows/**
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGISTRY: ghcr.io
  PYTHON_VERSION: "3.13"
  TRUNK_ORG_URL_SLUG: aethereal

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      build_related: ${{ steps.filter.outputs.build_related }}
      template_assets_related: ${{ steps.filter.outputs.template_assets_related }}
      renovate_related: ${{ steps.filter.outputs.renovate_related }}
      tooling_related: ${{ steps.filter.outputs.tooling_related }}
      workflow_related: ${{ steps.filter.outputs.workflow_related }}
      run_tests_requested: ${{ steps.filter.outputs.run_tests_requested }}
      publish_requested: ${{ steps.filter.outputs.publish_requested }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Classify changed files
        id: filter
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before || '' }}
          BASE_SHA: ${{ github.event.pull_request.base.sha || '' }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          GITHUB_SHA_VALUE: ${{ github.sha }}
          GITHUB_REF_VALUE: ${{ github.ref }}
        run: |
          python3 scripts/ci_flags.py \
            --event-name "${EVENT_NAME}" \
            --ref "${GITHUB_REF_VALUE}" >> "${GITHUB_OUTPUT}"

          if [[ "${EVENT_NAME}" == "workflow_dispatch" ]]; then
            echo "build_related=true" >> "${GITHUB_OUTPUT}"
            echo "template_assets_related=true" >> "${GITHUB_OUTPUT}"
            echo "renovate_related=true" >> "${GITHUB_OUTPUT}"
            echo "tooling_related=true" >> "${GITHUB_OUTPUT}"
            echo "workflow_related=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          if [[ "${EVENT_NAME}" == "pull_request" ]]; then
            base="${BASE_SHA}"
            head="${HEAD_SHA}"
          else
            base="${BEFORE_SHA}"
            head="${GITHUB_SHA_VALUE}"
          fi

          if ! git rev-parse --git-dir >/dev/null 2>&1; then
            echo "Git metadata is unavailable; treating the workflow as fully impacted."
            echo "build_related=true" >> "${GITHUB_OUTPUT}"
            echo "template_assets_related=true" >> "${GITHUB_OUTPUT}"
            echo "renovate_related=true" >> "${GITHUB_OUTPUT}"
            echo "tooling_related=true" >> "${GITHUB_OUTPUT}"
            echo "workflow_related=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          if [[ -z "${base}" || "${base}" =~ ^0+$ ]]; then
            if ! changed_files="$(git show --pretty='' --name-only "${head}" 2>/dev/null)"; then
              echo "Unable to inspect commit range; treating the workflow as fully impacted."
              echo "build_related=true" >> "${GITHUB_OUTPUT}"
              echo "template_assets_related=true" >> "${GITHUB_OUTPUT}"
              echo "renovate_related=true" >> "${GITHUB_OUTPUT}"
              echo "tooling_related=true" >> "${GITHUB_OUTPUT}"
              echo "workflow_related=true" >> "${GITHUB_OUTPUT}"
              exit 0
            fi
          else
            if ! changed_files="$(git diff --name-only "${base}" "${head}" 2>/dev/null)"; then
              echo "Unable to diff commit range; treating the workflow as fully impacted."
              echo "build_related=true" >> "${GITHUB_OUTPUT}"
              echo "template_assets_related=true" >> "${GITHUB_OUTPUT}"
              echo "renovate_related=true" >> "${GITHUB_OUTPUT}"
              echo "tooling_related=true" >> "${GITHUB_OUTPUT}"
              echo "workflow_related=true" >> "${GITHUB_OUTPUT}"
              exit 0
            fi
          fi

          printf 'Changed files:\n%s\n' "${changed_files}"

          build_related=false
          template_assets_related=false
          renovate_related=false
          tooling_related=false
          workflow_related=false

          while IFS= read -r path; do
            [[ -z "${path}" ]] && continue
            case "${path}" in
              Dockerfile|pyproject.toml|requirements-dev.txt|upstream.toml|rootfs/*|tests/*)
                build_related=true
                ;;
              *.xml|assets/*)
                template_assets_related=true
                ;;
              CHANGELOG.md|cliff.toml|scripts/*|.trunk/*)
                tooling_related=true
                ;;
              .github/workflows/*)
                tooling_related=true
                workflow_related=true
                ;;
              renovate.json)
                renovate_related=true
                ;;
            esac
          done <<< "${changed_files}"

          echo "build_related=${build_related}" >> "${GITHUB_OUTPUT}"
          echo "template_assets_related=${template_assets_related}" >> "${GITHUB_OUTPUT}"
          echo "renovate_related=${renovate_related}" >> "${GITHUB_OUTPUT}"
          echo "tooling_related=${tooling_related}" >> "${GITHUB_OUTPUT}"
          echo "workflow_related=${workflow_related}" >> "${GITHUB_OUTPUT}"

  validate-template:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.build_related == 'true' || needs.detect-changes.outputs.template_assets_related == 'true' || needs.detect-changes.outputs.renovate_related == 'true' || needs.detect-changes.outputs.tooling_related == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      ENABLE_AIO_AUTOMATION: ${{ vars.ENABLE_AIO_AUTOMATION }}
      TEMPLATE_XML: ${{ vars.TEMPLATE_XML }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Validate shell and python scripts
        if: ${{ needs.detect-changes.outputs.build_related == 'true' || needs.detect-changes.outputs.tooling_related == 'true' }}
        run: |
          bash -n scripts/validate-derived-repo.sh
          PYTHONPYCACHEPREFIX=/tmp/unraid-aio-template-pyc python3 -m py_compile scripts/ci_flags.py
          PYTHONPYCACHEPREFIX=/tmp/unraid-aio-template-pyc python3 -m py_compile scripts/check-upstream.py
          PYTHONPYCACHEPREFIX=/tmp/unraid-aio-template-pyc python3 -m py_compile scripts/validate-template.py
          PYTHONPYCACHEPREFIX=/tmp/unraid-aio-template-pyc python3 -m py_compile scripts/update-template-changes.py
          PYTHONPYCACHEPREFIX=/tmp/unraid-aio-template-pyc python3 -m py_compile scripts/release.py
          find rootfs -type f -name '*.sh' -print0 | xargs -0 -n1 bash -n
          find rootfs -type f -path '*/run' -print0 | xargs -0 -n1 bash -n

      - name: Validate Renovate config
        if: ${{ needs.detect-changes.outputs.renovate_related == 'true' }}
        run: npx --yes --package renovate renovate-config-validator renovate.json

  pinned-actions:
    needs: detect-changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Skip when workflow files are unchanged
        if: ${{ needs.detect-changes.outputs.workflow_related != 'true' }}
        run: echo "Workflow files unchanged; skipping pinned action scan."

      - name: Checkout
        if: ${{ needs.detect-changes.outputs.workflow_related == 'true' }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Enforce pinned action SHAs
        if: ${{ needs.detect-changes.outputs.workflow_related == 'true' }}
        run: |
          python3 - <<'PY'
          import pathlib
          import re
          import sys

          workflow_dir = pathlib.Path(".github/workflows")
          pattern = re.compile(r"^\s*uses:\s*([^@\s]+)@([^\s#]+)")
          sha_pattern = re.compile(r"^[0-9a-f]{40}$")
          failures = []

          for path in sorted(workflow_dir.glob("*.yml")):
              for lineno, line in enumerate(path.read_text().splitlines(), start=1):
                  match = pattern.match(line)
                  if not match:
                      continue
                  target, ref = match.groups()
                  if target.startswith("./"):
                      continue
                  if not sha_pattern.fullmatch(ref):
                      failures.append(f"{path}:{lineno}: action is not pinned to a full SHA -> {line.strip()}")

          if failures:
              print("\n".join(failures), file=sys.stderr)
              sys.exit(1)
          print("All workflow actions are pinned to full commit SHAs.")
          PY

  dependency-review:
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Dependency review
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0

  unit-tests:
    if: ${{ needs.detect-changes.outputs.build_related == 'true' || needs.detect-changes.outputs.template_assets_related == 'true' || needs.detect-changes.outputs.tooling_related == 'true' }}
    needs:
      - detect-changes
      - validate-template
      - pinned-actions
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      TRUNK_API_TOKEN: ${{ secrets.TRUNK_API_TOKEN }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - name: Install pytest
        run: python -m pip install -r requirements-dev.txt

      - name: Run pytest unit tests
        id: unit_pytest
        run: |
          mkdir -p reports
          rm -f reports/pytest-unit.xml
          set +e
          python -m pytest \
            tests/unit \
            tests/template \
            --junit-xml=reports/pytest-unit.xml \
            -o junit_family=xunit1
          status=$?
          echo "exit_code=${status}" >> "${GITHUB_OUTPUT}"
          exit 0

      - name: Upload unit test results to Trunk
        if: ${{ always() && env.TRUNK_API_TOKEN != '' }}
        continue-on-error: true
        uses: trunk-io/analytics-uploader@0e6c416c9d47c105654657984e5e4f0506dd84aa # v1
        env:
          TRUNK_API_TOKEN: ${{ secrets.TRUNK_API_TOKEN }}
        with:
          junit-paths: reports/pytest-unit.xml
          org-slug: ${{ env.TRUNK_ORG_URL_SLUG }}
          token: ${{ env.TRUNK_API_TOKEN }}

      - name: Fail if unit tests failed
        if: ${{ steps.unit_pytest.outputs.exit_code != '0' }}
        run: exit 1

  integration-tests:
    if: ${{ needs.detect-changes.outputs.run_tests_requested == 'true' && (needs.detect-changes.outputs.build_related == 'true' || (github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.detect-changes.outputs.publish_requested == 'true')) }}
    needs:
      - detect-changes
      - validate-template
      - pinned-actions
      - unit-tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      TRUNK_API_TOKEN: ${{ secrets.TRUNK_API_TOKEN }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      - name: Prebuild pytest image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          platforms: linux/amd64
          load: true
          tags: aio-template:pytest
          cache-from: type=gha,scope=unraid-aio-template-pytest
          cache-to: type=gha,mode=max,scope=unraid-aio-template-pytest

      - name: Install pytest
        run: python -m pip install -r requirements-dev.txt

      - name: Run pytest integration tests
        id: integration_pytest
        env:
          AIO_PYTEST_USE_PREBUILT_IMAGE: "true"
        run: |
          mkdir -p reports
          rm -f reports/pytest-integration.xml
          set +e
          python -m pytest \
            tests/integration \
            -m integration \
            --junit-xml=reports/pytest-integration.xml \
            -o junit_family=xunit1
          status=$?
          echo "exit_code=${status}" >> "${GITHUB_OUTPUT}"
          exit 0

      - name: Upload integration test results to Trunk
        if: ${{ always() && env.TRUNK_API_TOKEN != '' }}
        continue-on-error: true
        uses: trunk-io/analytics-uploader@0e6c416c9d47c105654657984e5e4f0506dd84aa # v1
        env:
          TRUNK_API_TOKEN: ${{ secrets.TRUNK_API_TOKEN }}
        with:
          junit-paths: reports/pytest-integration.xml
          org-slug: ${{ env.TRUNK_ORG_URL_SLUG }}
          token: ${{ env.TRUNK_API_TOKEN }}

      - name: Dump Docker diagnostics
        if: failure()
        run: |
          docker ps -a
          echo
          docker images

      - name: Fail if integration tests failed
        if: ${{ steps.integration_pytest.outputs.exit_code != '0' }}
        run: exit 1

  publish:
    if: ${{ needs.detect-changes.outputs.build_related == 'true' && vars.ENABLE_AIO_AUTOMATION == 'true' && github.event_name == 'push' && needs.detect-changes.outputs.publish_requested == 'true' && needs.integration-tests.result == 'success' }}
    needs:
      - detect-changes
      - validate-template
      - pinned-actions
      - unit-tests
      - integration-tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      IMAGE_NAME_OVERRIDE: ${{ vars.IMAGE_NAME_OVERRIDE }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@4106dd6b0b250706f5d278a4f0b7883c97bf42f2 # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Login to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: prep
        run: |
          image_name="${IMAGE_NAME_OVERRIDE:-${GITHUB_REPOSITORY}}"
          image="$(printf '%s' "${REGISTRY}/${image_name}" | tr '[:upper:]' '[:lower:]')"
          sha_tag="${image}:sha-${GITHUB_SHA}"

          {
            echo "tags<<EOF"
            echo "${image}:latest"
            echo "${sha_tag}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Build and push multi-arch image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          cache-from: type=gha,scope=unraid-aio-template-publish
          cache-to: type=gha,mode=max,scope=unraid-aio-template-publish
          tags: ${{ steps.prep.outputs.tags }}

  sync-awesome-unraid:
    if: ${{ needs.detect-changes.outputs.template_assets_related == 'true' && vars.ENABLE_AIO_AUTOMATION == 'true' && github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') }}
    needs:
      - detect-changes
      - validate-template
      - pinned-actions
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Resolve sync configuration
        id: sync_config
        env:
          SYNC_TOKEN: ${{ secrets.SYNC_TOKEN }}
          TEMPLATE_XML_INPUT: ${{ vars.TEMPLATE_XML }}
          TEMPLATE_ICON_PATH_INPUT: ${{ vars.TEMPLATE_ICON_PATH }}
          TARGET_REPOSITORY_INPUT: ${{ vars.AWESOME_UNRAID_REPOSITORY }}
          TARGET_XML_NAME_INPUT: ${{ vars.AWESOME_UNRAID_XML_NAME }}
          TARGET_ICON_NAME_INPUT: ${{ vars.AWESOME_UNRAID_ICON_NAME }}
        run: |
          template_xml="${TEMPLATE_XML_INPUT:-template-aio.xml}"
          template_icon_path="${TEMPLATE_ICON_PATH_INPUT:-assets/app-icon.png}"
          target_repository="${TARGET_REPOSITORY_INPUT:-JSONbored/awesome-unraid}"
          target_xml_name="${TARGET_XML_NAME_INPUT:-template-aio.xml}"
          target_icon_name="${TARGET_ICON_NAME_INPUT:-}"

          if [[ -n "${SYNC_TOKEN}" && -n "${template_xml}" && -n "${target_repository}" && -n "${target_xml_name}" ]]; then
            echo "enabled=true" >> "${GITHUB_OUTPUT}"
          else
            echo "enabled=false" >> "${GITHUB_OUTPUT}"
            echo "Sync is not fully configured; skipping."
          fi

          echo "template_xml=${template_xml}" >> "${GITHUB_OUTPUT}"
          echo "template_icon_path=${template_icon_path}" >> "${GITHUB_OUTPUT}"
          echo "target_repository=${target_repository}" >> "${GITHUB_OUTPUT}"
          echo "target_xml_name=${target_xml_name}" >> "${GITHUB_OUTPUT}"
          echo "target_icon_name=${target_icon_name}" >> "${GITHUB_OUTPUT}"

      - name: Checkout Source Repository
        if: ${{ steps.sync_config.outputs.enabled == 'true' }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Checkout Target Repository
        if: ${{ steps.sync_config.outputs.enabled == 'true' }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ steps.sync_config.outputs.target_repository }}
          token: ${{ secrets.SYNC_TOKEN }}
          path: target-repo

      - name: Copy and Commit Template
        if: ${{ steps.sync_config.outputs.enabled == 'true' }}
        env:
          TEMPLATE_XML: ${{ steps.sync_config.outputs.template_xml }}
          TEMPLATE_ICON_PATH: ${{ steps.sync_config.outputs.template_icon_path }}
          TARGET_XML_NAME: ${{ steps.sync_config.outputs.target_xml_name }}
          TARGET_ICON_NAME: ${{ steps.sync_config.outputs.target_icon_name }}
        run: |
          if [[ -z "${TARGET_ICON_NAME}" && -f "${TEMPLATE_ICON_PATH}" ]]; then
            stem="${TARGET_XML_NAME%.xml}"
            stem="${stem%-aio}"
            TARGET_ICON_NAME="${stem}.png"
          fi
          cp "${TEMPLATE_XML}" "target-repo/${TARGET_XML_NAME}"
          mkdir -p target-repo/icons
          if [[ -n "${TARGET_ICON_NAME}" && -f "${TEMPLATE_ICON_PATH}" ]]; then
            cp "${TEMPLATE_ICON_PATH}" "target-repo/icons/${TARGET_ICON_NAME}"
          fi

      - name: Create sync pull request
        if: ${{ steps.sync_config.outputs.enabled == 'true' }}
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ secrets.SYNC_TOKEN }}
          path: target-repo
          add-paths: |
            ${{ steps.sync_config.outputs.target_xml_name }}
            icons/${{ steps.sync_config.outputs.target_icon_name }}
          commit-message: "chore: auto-sync AIO template assets"
          branch: "sync-awesome-unraid/${{ github.event.repository.name }}"
          delete-branch: true
          base: main
          title: "chore: sync ${{ github.event.repository.name }} template assets"
          body: |
            Automated sync from `${{ github.repository }}`.
