name: Build AIO Image

on:
  push:
    branches: [main]
    tags:
      - "v*"
    paths:
      - Dockerfile
      - "*.xml"
      - assets/**
      - rootfs/**
      - scripts/**
      - upstream.toml
      - renovate.json
      - .github/workflows/**
  pull_request:
    branches: [main]
    paths:
      - Dockerfile
      - "*.xml"
      - assets/**
      - rootfs/**
      - scripts/**
      - upstream.toml
      - renovate.json
      - .github/workflows/**
  workflow_dispatch:
    inputs:
      run_smoke_test:
        description: "Run the smoke-test job"
        required: false
        default: false
        type: boolean
      publish_images:
        description: "Publish image tags from the current ref"
        required: false
        default: false
        type: boolean
      sync_awesome_unraid:
        description: "Open or refresh the awesome-unraid sync pull request"
        required: false
        default: false
        type: boolean

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ vars.IMAGE_NAME_OVERRIDE || github.repository }}

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      build_related: ${{ steps.filter.outputs.build_related }}
      template_assets_related: ${{ steps.filter.outputs.template_assets_related }}
      renovate_related: ${{ steps.filter.outputs.renovate_related }}
      tooling_related: ${{ steps.filter.outputs.tooling_related }}
      run_smoke_requested: ${{ steps.filter.outputs.run_smoke_requested }}
      publish_requested: ${{ steps.filter.outputs.publish_requested }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Classify changed files
        id: filter
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before || '' }}
          BASE_SHA: ${{ github.event.pull_request.base.sha || '' }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          GITHUB_SHA_VALUE: ${{ github.sha }}
          GITHUB_REF_VALUE: ${{ github.ref }}
          RUN_SMOKE_TEST_INPUT: ${{ github.event.inputs.run_smoke_test || '' }}
          PUBLISH_IMAGES_INPUT: ${{ github.event.inputs.publish_images || '' }}
        run: |
          python3 scripts/ci_flags.py \
            --event-name "${EVENT_NAME}" \
            --ref "${GITHUB_REF_VALUE}" \
            --run-smoke-test-input "${RUN_SMOKE_TEST_INPUT}" \
            --publish-images-input "${PUBLISH_IMAGES_INPUT}" >> "${GITHUB_OUTPUT}"

          if [[ "${EVENT_NAME}" == "workflow_dispatch" ]]; then
            echo "build_related=true" >> "${GITHUB_OUTPUT}"
            echo "template_assets_related=true" >> "${GITHUB_OUTPUT}"
            echo "renovate_related=true" >> "${GITHUB_OUTPUT}"
            echo "tooling_related=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          if [[ "${EVENT_NAME}" == "pull_request" ]]; then
            base="${BASE_SHA}"
            head="${HEAD_SHA}"
          else
            base="${BEFORE_SHA}"
            head="${GITHUB_SHA_VALUE}"
          fi

          if ! git rev-parse --git-dir >/dev/null 2>&1; then
            echo "Git metadata is unavailable; treating the workflow as fully impacted."
            echo "build_related=true" >> "${GITHUB_OUTPUT}"
            echo "template_assets_related=true" >> "${GITHUB_OUTPUT}"
            echo "renovate_related=true" >> "${GITHUB_OUTPUT}"
            echo "tooling_related=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          if [[ -z "${base}" || "${base}" =~ ^0+$ ]]; then
            if ! changed_files="$(git show --pretty='' --name-only "${head}" 2>/dev/null)"; then
              echo "Unable to inspect commit range; treating the workflow as fully impacted."
              echo "build_related=true" >> "${GITHUB_OUTPUT}"
              echo "template_assets_related=true" >> "${GITHUB_OUTPUT}"
              echo "renovate_related=true" >> "${GITHUB_OUTPUT}"
              echo "tooling_related=true" >> "${GITHUB_OUTPUT}"
              exit 0
            fi
          else
            if ! changed_files="$(git diff --name-only "${base}" "${head}" 2>/dev/null)"; then
              echo "Unable to diff commit range; treating the workflow as fully impacted."
              echo "build_related=true" >> "${GITHUB_OUTPUT}"
              echo "template_assets_related=true" >> "${GITHUB_OUTPUT}"
              echo "renovate_related=true" >> "${GITHUB_OUTPUT}"
              echo "tooling_related=true" >> "${GITHUB_OUTPUT}"
              exit 0
            fi
          fi

          printf 'Changed files:\n%s\n' "${changed_files}"

          build_related=false
          template_assets_related=false
          renovate_related=false
          tooling_related=false

          while IFS= read -r path; do
            [[ -z "${path}" ]] && continue
            case "${path}" in
              Dockerfile|upstream.toml|rootfs/*)
                build_related=true
                ;;
              *.xml|assets/*)
                template_assets_related=true
                ;;
              scripts/*|.github/workflows/*)
                tooling_related=true
                ;;
              renovate.json)
                renovate_related=true
                ;;
            esac
          done <<< "${changed_files}"

          echo "build_related=${build_related}" >> "${GITHUB_OUTPUT}"
          echo "template_assets_related=${template_assets_related}" >> "${GITHUB_OUTPUT}"
          echo "renovate_related=${renovate_related}" >> "${GITHUB_OUTPUT}"
          echo "tooling_related=${tooling_related}" >> "${GITHUB_OUTPUT}"

  validate-template:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.build_related == 'true' || needs.detect-changes.outputs.template_assets_related == 'true' || needs.detect-changes.outputs.renovate_related == 'true' || needs.detect-changes.outputs.tooling_related == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      ENABLE_AIO_AUTOMATION: ${{ vars.ENABLE_AIO_AUTOMATION }}
      TEMPLATE_XML: ${{ vars.TEMPLATE_XML }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Validate shell and python scripts
        if: ${{ needs.detect-changes.outputs.build_related == 'true' || needs.detect-changes.outputs.tooling_related == 'true' }}
        run: |
          bash -n scripts/smoke-test.sh
          bash -n scripts/validate-derived-repo.sh
          PYTHONPYCACHEPREFIX=/tmp/unraid-aio-template-pyc python3 -m py_compile scripts/ci_flags.py
          PYTHONPYCACHEPREFIX=/tmp/unraid-aio-template-pyc python3 -m py_compile scripts/check-upstream.py
          PYTHONPYCACHEPREFIX=/tmp/unraid-aio-template-pyc python3 -m py_compile scripts/test-ci-flags.py
          PYTHONPYCACHEPREFIX=/tmp/unraid-aio-template-pyc python3 -m py_compile scripts/validate-template.py
          PYTHONPYCACHEPREFIX=/tmp/unraid-aio-template-pyc python3 -m py_compile scripts/update-template-changes.py
          PYTHONPYCACHEPREFIX=/tmp/unraid-aio-template-pyc python3 -m py_compile scripts/release.py
          find rootfs -type f -name '*.sh' -print0 | xargs -0 -n1 bash -n
          find rootfs -type f -path '*/run' -print0 | xargs -0 -n1 bash -n

      - name: Validate CI flag resolver behavior
        if: ${{ needs.detect-changes.outputs.build_related == 'true' || needs.detect-changes.outputs.tooling_related == 'true' }}
        run: |
          python3 scripts/test-ci-flags.py

      - name: Validate XML
        if: ${{ needs.detect-changes.outputs.build_related == 'true' || needs.detect-changes.outputs.template_assets_related == 'true' }}
        run: |
          python3 scripts/validate-template.py

      - name: Validate derived repo placeholders
        run: |
          chmod +x scripts/validate-derived-repo.sh
          ./scripts/validate-derived-repo.sh .

      - name: Validate Renovate config
        if: ${{ needs.detect-changes.outputs.renovate_related == 'true' }}
        run: npx --yes --package renovate renovate-config-validator renovate.json

  pinned-actions:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Enforce pinned action SHAs
        run: |
          python3 - <<'PY'
          import pathlib
          import re
          import sys

          workflow_dir = pathlib.Path(".github/workflows")
          pattern = re.compile(r"^\s*uses:\s*([^@\s]+)@([^\s#]+)")
          sha_pattern = re.compile(r"^[0-9a-f]{40}$")
          failures = []

          for path in sorted(workflow_dir.glob("*.yml")):
              for lineno, line in enumerate(path.read_text().splitlines(), start=1):
                  match = pattern.match(line)
                  if not match:
                      continue
                  target, ref = match.groups()
                  if target.startswith("./"):
                      continue
                  if not sha_pattern.fullmatch(ref):
                      failures.append(f"{path}:{lineno}: action is not pinned to a full SHA -> {line.strip()}")

          if failures:
              print("\n".join(failures), file=sys.stderr)
              sys.exit(1)
          print("All workflow actions are pinned to full commit SHAs.")
          PY

  dependency-review:
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Dependency review
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0

  smoke-test:
    if: ${{ needs.detect-changes.outputs.build_related == 'true' && vars.ENABLE_AIO_AUTOMATION == 'true' && needs.detect-changes.outputs.run_smoke_requested == 'true' }}
    needs:
      - detect-changes
      - validate-template
      - pinned-actions
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build local test image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          platforms: linux/amd64
          load: true
          tags: aio-template:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test
        run: |
          chmod +x scripts/smoke-test.sh
          export KEEP_SMOKE_ARTIFACTS=1
          bash -x ./scripts/smoke-test.sh aio-template:ci

      - name: Dump smoke test diagnostics
        if: failure()
        run: |
          echo "Active containers:"
          docker ps -a
          echo
          echo "Inspecting smoke container:"
          docker inspect "${CONTAINER_NAME:-aio-template-smoke}" || true
          echo
          echo "Container logs:"
          docker logs "${CONTAINER_NAME:-aio-template-smoke}" || true

  publish:
    if: ${{ needs.detect-changes.outputs.build_related == 'true' && vars.ENABLE_AIO_AUTOMATION == 'true' && github.event_name != 'pull_request' && needs.detect-changes.outputs.publish_requested == 'true' }}
    needs:
      - detect-changes
      - validate-template
      - pinned-actions
      - smoke-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@4106dd6b0b250706f5d278a4f0b7883c97bf42f2 # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Login to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: prep
        run: |
          image="$(printf '%s' "${REGISTRY}/${IMAGE_NAME}" | tr '[:upper:]' '[:lower:]')"
          sha_tag="${image}:sha-${GITHUB_SHA}"

          {
            echo "tags<<EOF"
            if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
              version="${GITHUB_REF#refs/tags/}"
              version_no_v="${version#v}"
              IFS='.' read -r major minor patch <<< "${version_no_v}"
              echo "${image}:${version}"
              if [[ -n "${major:-}" ]]; then
                echo "${image}:v${major}"
              fi
              if [[ -n "${major:-}" && -n "${minor:-}" ]]; then
                echo "${image}:v${major}.${minor}"
              fi
            else
              echo "${image}:latest"
            fi
            echo "${sha_tag}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Build and push multi-arch image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: ${{ steps.prep.outputs.tags }}

  sync-awesome-unraid:
    if: ${{ needs.detect-changes.outputs.template_assets_related == 'true' && vars.ENABLE_AIO_AUTOMATION == 'true' && github.ref == 'refs/heads/main' && (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.sync_awesome_unraid == 'true')) }}
    needs:
      - detect-changes
      - validate-template
      - pinned-actions
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      TEMPLATE_XML: ${{ vars.TEMPLATE_XML || format('{0}.xml', github.event.repository.name) }}
      TEMPLATE_ICON_PATH: ${{ vars.TEMPLATE_ICON_PATH || 'assets/app-icon.png' }}
      TARGET_REPOSITORY: ${{ vars.AWESOME_UNRAID_REPOSITORY || 'JSONbored/awesome-unraid' }}
      TARGET_XML_NAME: ${{ vars.AWESOME_UNRAID_XML_NAME || format('{0}.xml', github.event.repository.name) }}
      TARGET_ICON_NAME: ${{ vars.AWESOME_UNRAID_ICON_NAME || '' }}
    steps:
      - name: Verify sync configuration
        id: token
        env:
          SYNC_TOKEN: ${{ secrets.SYNC_TOKEN }}
        run: |
          if [[ -n "${SYNC_TOKEN}" && -n "${TEMPLATE_XML}" && -n "${TARGET_REPOSITORY}" && -n "${TARGET_XML_NAME}" ]]; then
            echo "enabled=true" >> "${GITHUB_OUTPUT}"
          else
            echo "enabled=false" >> "${GITHUB_OUTPUT}"
            echo "Sync is not fully configured; skipping."
          fi

      - name: Checkout Source Repository
        if: ${{ steps.token.outputs.enabled == 'true' }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Checkout Target Repository
        if: ${{ steps.token.outputs.enabled == 'true' }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ env.TARGET_REPOSITORY }}
          token: ${{ secrets.SYNC_TOKEN }}
          path: target-repo

      - name: Copy and Commit Template
        if: ${{ steps.token.outputs.enabled == 'true' }}
        run: |
          if [[ -z "${TARGET_ICON_NAME}" && -f "${TEMPLATE_ICON_PATH}" ]]; then
            stem="${TARGET_XML_NAME%.xml}"
            stem="${stem%-aio}"
            TARGET_ICON_NAME="${stem}.png"
          fi
          cp "${TEMPLATE_XML}" "target-repo/${TARGET_XML_NAME}"
          mkdir -p target-repo/icons
          if [[ -n "${TARGET_ICON_NAME}" && -f "${TEMPLATE_ICON_PATH}" ]]; then
            cp "${TEMPLATE_ICON_PATH}" "target-repo/icons/${TARGET_ICON_NAME}"
          fi

      - name: Create sync pull request
        if: ${{ steps.token.outputs.enabled == 'true' }}
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ secrets.SYNC_TOKEN }}
          path: target-repo
          add-paths: |
            ${{ env.TARGET_XML_NAME }}
            icons/${{ env.TARGET_ICON_NAME }}
          commit-message: "chore: auto-sync AIO template assets"
          branch: "sync-awesome-unraid/${{ github.event.repository.name }}"
          delete-branch: true
          base: main
          title: "chore: sync ${{ github.event.repository.name }} template assets"
          body: |
            Automated sync from `${{ github.repository }}`.
