name: Build AIO Image

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ vars.IMAGE_NAME_OVERRIDE || github.repository }}

jobs:
  smoke-test:
    if: ${{ vars.ENABLE_AIO_AUTOMATION == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build local test image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          load: true
          tags: aio-template:ci

      - name: Smoke test
        run: |
          chmod +x scripts/smoke-test.sh
          bash -x ./scripts/smoke-test.sh aio-template:ci

      - name: Dump smoke test diagnostics
        if: failure()
        run: |
          docker ps -a
          docker inspect "${CONTAINER_NAME:-aio-template-smoke}" || true
          docker logs "${CONTAINER_NAME:-aio-template-smoke}" || true

  publish:
    if: ${{ vars.ENABLE_AIO_AUTOMATION == 'true' && github.event_name != 'pull_request' }}
    needs: smoke-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
